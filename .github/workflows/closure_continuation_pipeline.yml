name: closure-continuation-pipeline

on:
  workflow_run:
    workflows: ["review-trigger-pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      review_run_id:
        description: "review-trigger-pipeline run id to consume"
        required: true
        type: string
      closure_complete:
        description: "Pass closure_complete into CDE"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      final_verification_passed:
        description: "Pass final_verification_passed into CDE"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      hardening_completed:
        description: "Pass hardening_completed into CDE"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      escalation_required:
        description: "Pass escalation_required into CDE"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      bounded_next_step_available:
        description: "Pass bounded_next_step_available into CDE"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  closure-continuation:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.name == 'review-trigger-pipeline' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Resolve source run id
        id: source_run
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          DISPATCH_RUN_ID: ${{ github.event.inputs.review_run_id }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            RUN_ID="$DISPATCH_RUN_ID"
          else
            RUN_ID="$WORKFLOW_RUN_ID"
          fi

          if [[ -z "$RUN_ID" ]]; then
            echo "Unable to resolve source review-trigger run id" >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download review-trigger artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ steps.source_run.outputs.run_id }}
          name: review-trigger-pipeline-artifacts
          path: downloaded_review_trigger
          if_no_artifact_found: fail

      - name: Inspect ingestion command marker
        id: ingestion_gate
        run: |
          set -euo pipefail
          python - <<'PY'
import json
from pathlib import Path

summary_path = Path("downloaded_review_trigger/ingestion_result.json")
if not summary_path.exists():
    raise SystemExit("missing ingestion_result.json from review-trigger artifacts")
summary = json.loads(summary_path.read_text(encoding="utf-8"))
command = summary.get("command_marker")
if command == "/roadmap-draft":
    Path("continuation_result.json").write_text(
        json.dumps(
            {
                "status": "skipped",
                "skip_reason": "roadmap_draft_preview_only",
                "command_marker": command,
                "pr_number": summary.get("pr_number"),
                "ingestion_id": summary.get("ingestion_id"),
                "tlc_ran": False,
                "guardrails": {
                    "draft_does_not_trigger_execution": True,
                },
            },
            indent=2,
            sort_keys=True,
        )
        + "\n",
        encoding="utf-8",
    )
    print("should_continue=false")
else:
    print("should_continue=true")
PY
          SHOULD_CONTINUE=$(python - <<'PY'
import json
from pathlib import Path
result = json.loads(Path("downloaded_review_trigger/ingestion_result.json").read_text(encoding="utf-8"))
print("false" if result.get("command_marker") == "/roadmap-draft" else "true")
PY
)
          echo "should_continue=$SHOULD_CONTINUE" >> "$GITHUB_OUTPUT"

      - name: Run governed closure + continuation
        if: steps.ingestion_gate.outputs.should_continue == 'true'
        id: continuation
        env:
          OUTPUT_ROOT: artifacts/github_closure_continuation
          EVENT_NAME: ${{ github.event_name }}
          CLOSURE_COMPLETE_DISPATCH: ${{ github.event.inputs.closure_complete }}
          FINAL_VERIFICATION_DISPATCH: ${{ github.event.inputs.final_verification_passed }}
          HARDENING_COMPLETED_DISPATCH: ${{ github.event.inputs.hardening_completed }}
          ESCALATION_REQUIRED_DISPATCH: ${{ github.event.inputs.escalation_required }}
          BOUNDED_NEXT_STEP_DISPATCH: ${{ github.event.inputs.bounded_next_step_available }}
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT_ROOT"

          INGESTION_SUMMARY="downloaded_review_trigger/ingestion_result.json"
          if [[ ! -f "$INGESTION_SUMMARY" ]]; then
            echo "missing ingestion_result.json from review-trigger artifacts" >&2
            exit 1
          fi
          HANDOFF_ARTIFACT="downloaded_review_trigger/github_review_handoff_artifact.json"
          if [[ ! -f "$HANDOFF_ARTIFACT" ]]; then
            echo "missing deterministic handoff artifact: downloaded_review_trigger/github_review_handoff_artifact.json" >&2
            exit 1
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            CLOSURE_COMPLETE="$CLOSURE_COMPLETE_DISPATCH"
            FINAL_VERIFICATION="$FINAL_VERIFICATION_DISPATCH"
            HARDENING_COMPLETED="$HARDENING_COMPLETED_DISPATCH"
            ESCALATION_REQUIRED="$ESCALATION_REQUIRED_DISPATCH"
            BOUNDED_NEXT_STEP="$BOUNDED_NEXT_STEP_DISPATCH"
          else
            CLOSURE_COMPLETE="false"
            FINAL_VERIFICATION="false"
            HARDENING_COMPLETED="false"
            ESCALATION_REQUIRED="false"
            BOUNDED_NEXT_STEP="true"
          fi

          CMD=(python -m spectrum_systems.modules.runtime.github_closure_continuation
            --github-review-handoff-path "$HANDOFF_ARTIFACT"
            --output-root "$OUTPUT_ROOT"
            --retry-budget 0
          )

          [[ "$CLOSURE_COMPLETE" == "true" ]] && CMD+=(--closure-complete)
          [[ "$FINAL_VERIFICATION" == "true" ]] && CMD+=(--final-verification-passed)
          [[ "$HARDENING_COMPLETED" == "true" ]] && CMD+=(--hardening-completed)
          [[ "$ESCALATION_REQUIRED" == "true" ]] && CMD+=(--escalation-required)
          [[ "$BOUNDED_NEXT_STEP" == "true" ]] && CMD+=(--bounded-next-step-available)

          "${CMD[@]}" > continuation_result.json

          CONTINUATION_DIR=$(python - <<'PY'
import json
from pathlib import Path
payload = json.loads(Path('continuation_result.json').read_text(encoding='utf-8'))
print(payload['continuation_dir'])
PY
)
          echo "continuation_dir=$CONTINUATION_DIR" >> "$GITHUB_OUTPUT"

      - name: Enforce terminal state and branch-update policy guardrails
        if: steps.ingestion_gate.outputs.should_continue == 'true'
        run: |
          set -euo pipefail
          python - <<'PY'
import json
from pathlib import Path
result = json.loads(Path("continuation_result.json").read_text(encoding="utf-8"))
terminal = result.get("final_terminal_state")
allowed = {"ready_for_merge", "blocked", "exhausted", "escalated"}
if terminal not in allowed:
    raise SystemExit(f"unsupported terminal state: {terminal}")
policy = result.get("branch_update_policy")
if not isinstance(policy, dict):
    raise SystemExit("branch_update_policy missing from continuation_result")
if policy.get("branch_update_allowed") and result.get("cde_decision") != "continue_bounded":
    raise SystemExit("branch updates are allowed only for continue_bounded governed path")
PY

      - name: Upload closure-continuation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: closure-continuation-pipeline-artifacts
          path: |
            continuation_result.json
            ${{ steps.continuation.outputs.continuation_dir }}
          if-no-files-found: error

      - name: Build PR feedback comment payload
        if: steps.ingestion_gate.outputs.should_continue == 'true'
        id: pr_feedback
        run: |
          set -euo pipefail
          python - <<'PY'
import json
from pathlib import Path

from spectrum_systems.modules.runtime.github_pr_feedback import build_pr_feedback_comment

result_path = Path("continuation_result.json")
if not result_path.exists():
    raise SystemExit("continuation_result.json missing; cannot build PR feedback payload")

result = json.loads(result_path.read_text(encoding="utf-8"))
artifact_paths = result.get("artifact_paths")
if not isinstance(artifact_paths, dict):
    raise SystemExit("continuation_result.artifact_paths missing or invalid")

closure_path_raw = artifact_paths.get("closure_decision_artifact")
if not isinstance(closure_path_raw, str) or not closure_path_raw.strip():
    raise SystemExit("required artifact missing: closure_decision_artifact")

closure_path = Path(closure_path_raw)
if not closure_path.exists():
    raise SystemExit(f"required artifact path not found: {closure_path}")

closure_artifact = json.loads(closure_path.read_text(encoding="utf-8"))

tlc_artifact = None
tlc_path_raw = artifact_paths.get("top_level_conductor_run_artifact")
if result.get("tlc_ran", False):
    if not isinstance(tlc_path_raw, str) or not tlc_path_raw.strip():
        raise SystemExit("required artifact missing for tlc_ran=true: top_level_conductor_run_artifact")
    tlc_path = Path(tlc_path_raw)
    if not tlc_path.exists():
        raise SystemExit(f"required artifact path not found: {tlc_path}")
    tlc_artifact = json.loads(tlc_path.read_text(encoding="utf-8"))
elif tlc_path_raw is not None:
    tlc_path = Path(str(tlc_path_raw))
    if tlc_path.exists():
        tlc_artifact = json.loads(tlc_path.read_text(encoding="utf-8"))

terminal_state = result.get("final_terminal_state")
if not isinstance(terminal_state, str) or not terminal_state.strip():
    raise SystemExit("terminal state undefined in continuation_result.final_terminal_state")

comment = build_pr_feedback_comment(
    {
        "closure_decision_artifact": closure_artifact,
        "top_level_conductor_run_artifact": tlc_artifact,
        "continuation_result": result,
        "artifact_paths": artifact_paths,
    }
)

Path("pr_feedback_comment.md").write_text(comment, encoding="utf-8")
PY

      - name: Post PR feedback comment
        if: steps.ingestion_gate.outputs.should_continue == 'true'
        # Read-only status feedback only: one marker-scoped machine comment is created/updated per PR.
        uses: actions/github-script@v7
        env:
          COMMENT_FILE: pr_feedback_comment.md
          COMMENT_MARKER: "<!-- spectrum-systems-governed-run-result -->"
        with:
          script: |
            const fs = require('fs');
            const marker = process.env.COMMENT_MARKER;
            const commentPath = process.env.COMMENT_FILE;
            if (!fs.existsSync(commentPath)) {
              core.setFailed(`Missing comment payload file: ${commentPath}`);
              return;
            }
            if (!fs.existsSync('continuation_result.json')) {
              core.setFailed('Missing continuation_result.json');
              return;
            }

            const result = JSON.parse(fs.readFileSync('continuation_result.json', 'utf8'));
            const prNumber = result.pr_number;
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed('continuation_result.pr_number must be a positive integer');
              return;
            }

            const body = `${marker}\n` + fs.readFileSync(commentPath, 'utf8');
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find((comment) => typeof comment.body === 'string' && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing governed run comment on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Created governed run comment on PR #${prNumber}`);
            }

      - name: Write workflow summary
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
import json
from pathlib import Path

result_path = Path('continuation_result.json')
if not result_path.exists():
    raise SystemExit('continuation_result.json missing; workflow failed closed before output emission')

payload = json.loads(result_path.read_text(encoding='utf-8'))
artifact_paths = payload.get('artifact_paths', {})

if payload.get("status") == "skipped":
    lines = [
        '## Closure Continuation Pipeline Summary',
        '',
        '- Status: **skipped**',
        f"- Reason: `{payload.get('skip_reason', 'unknown')}`",
        f"- Command marker: `{payload.get('command_marker')}`",
        f"- PR: **#{payload.get('pr_number')}**",
        '- Guardrail: Draft preview does not trigger continuation.',
    ]
    Path('summary.md').write_text('\\n'.join(lines) + '\\n', encoding='utf-8')
    raise SystemExit(0)

lines = [
    '## Closure Continuation Pipeline Summary',
    '',
    f"- CDE decision: **{payload['cde_decision']}**",
    f"- TLC ran: **{payload['tlc_ran']}**",
    f"- Final terminal state: **{payload['final_terminal_state']}**",
    f"- Branch update allowed: **{payload.get('branch_update_policy', {}).get('branch_update_allowed', False)}**",
    f"- Continuation directory: `{payload['continuation_dir']}`",
    '- Artifact refs/paths:',
]
for key in ('closure_decision_artifact', 'next_step_prompt_artifact', 'top_level_conductor_run_artifact'):
    lines.append(f"  - `{key}`: `{artifact_paths.get(key)}`")

Path('summary.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
PY
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
