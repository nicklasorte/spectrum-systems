name: lifecycle-enforcement

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'codex/**'
  pull_request:

permissions:
  contents: read

jobs:
  validate-lifecycle-definitions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify dependency bootstrap contract
        run: python scripts/verify_environment.py --python-only

      - name: Validate lifecycle definitions and data backbone
        run: python scripts/validate_lifecycle_data.py

  run-lifecycle-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify dependency bootstrap contract
        run: python scripts/verify_environment.py --python-only

      - name: Run lifecycle and data backbone tests
        run: pytest tests/test_lifecycle_enforcer.py -v

  eval-ci-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify dependency bootstrap contract
        run: python scripts/verify_environment.py --python-only

      - name: Run fail-closed eval CI gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          fixtures = Path("outputs/eval_ci_gate/fixtures")
          fixtures.mkdir(parents=True, exist_ok=True)

          eval_case = json.loads(Path("contracts/examples/eval_case.json").read_text(encoding="utf-8"))
          eval_run = json.loads(Path("contracts/examples/eval_run.json").read_text(encoding="utf-8"))
          eval_run["eval_case_ids"] = [str(eval_case["eval_case_id"])]
          eval_cases = [eval_case]

          (fixtures / "eval_run.json").write_text(json.dumps(eval_run, indent=2) + "\n", encoding="utf-8")
          (fixtures / "eval_cases.json").write_text(json.dumps(eval_cases, indent=2) + "\n", encoding="utf-8")
          PY
          python scripts/run_eval_ci_gate.py \
            --eval-run outputs/eval_ci_gate/fixtures/eval_run.json \
            --eval-cases outputs/eval_ci_gate/fixtures/eval_cases.json \
            --output-dir outputs/eval_ci_gate

      - name: Upload eval CI gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-ci-gate-artifacts
          path: outputs/eval_ci_gate/


  sel-replay-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify dependency bootstrap contract
        run: python scripts/verify_environment.py --python-only

      - name: Build SEL orchestration artifacts from governed CDE examples
        run: |
          mkdir -p outputs/sel_replay_gate/cde_bundle
          cp contracts/examples/continuation_decision_record.json outputs/sel_replay_gate/cde_bundle/continuation_decision_record.json
          cp contracts/examples/decision_bundle.json outputs/sel_replay_gate/cde_bundle/decision_bundle.json
          cp contracts/examples/decision_evidence_pack.json outputs/sel_replay_gate/cde_bundle/decision_evidence_pack.json
          python scripts/run_sel_orchestration.py             --cde-bundle-dir outputs/sel_replay_gate/cde_bundle             --output-dir outputs/sel_replay_gate/sel_output

      - name: Enforce SEL replay gate
        run: python scripts/run_sel_replay_gate.py           --output-dir outputs/sel_replay_gate/sel_output           --decision-record outputs/sel_replay_gate/cde_bundle/continuation_decision_record.json           --action-record outputs/sel_replay_gate/sel_output/enforcement_action_record.json

  governed-failure-injection-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify dependency bootstrap contract
        run: python scripts/verify_environment.py --python-only

      - name: Run governed failure injection regression gate
        run: python scripts/run_governed_failure_injection.py --output-dir outputs/governed_failure_injection

      - name: Run governed failure injection isolation tests
        run: pytest tests/test_governed_failure_injection.py -v

      - name: Upload governed failure injection artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governed-failure-injection-artifacts
          path: outputs/governed_failure_injection/
