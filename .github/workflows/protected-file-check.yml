name: Protected File Check

on:
  pull_request:
    branches: [main]

jobs:
  check-protected-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check Protected Files
        run: |
          mkdir -p outputs
          python scripts/check_protected_files.py \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --head-ref "${{ github.event.pull_request.head.sha }}" \
            --output outputs/protected_file_check_result.json

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: protected-file-check-result
          path: outputs/protected_file_check_result.json
