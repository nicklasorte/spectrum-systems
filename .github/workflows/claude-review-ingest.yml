name: claude-review-ingest

on:
  push:
    paths:
      - 'design-reviews/*.actions.json'
      - 'design-reviews/*.md'

permissions:
  contents: read
  issues: write

jobs:
  ingest-claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install validation dependencies
        run: npm install --no-save --no-package-lock ajv@^8 ajv-formats@^2

      - name: Detect changed Claude review action files
        id: changed
        shell: bash
        run: |
          set -eo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            CHANGED_ACTIONS=$(git ls-tree -r --name-only "$AFTER" | grep '^design-reviews/.*\.actions.json$' || true)
            CHANGED_MD=$(git ls-tree -r --name-only "$AFTER" | grep '^design-reviews/.*\.md$' | grep -v '^design-reviews/README.md$' | grep -v '^design-reviews/claude-review-template.md$' || true)
          else
            CHANGED_ACTIONS=$(git diff --name-only "$BEFORE" "$AFTER" -- 'design-reviews/*.actions.json')
            CHANGED_MD=$(git diff --name-only "$BEFORE" "$AFTER" -- 'design-reviews/*.md')
            CHANGED_MD=$(echo "$CHANGED_MD" | grep -v '^design-reviews/README.md$' | grep -v '^design-reviews/claude-review-template.md$' || true)
          fi

          FILES=()
          MISSING=()

          for md in $CHANGED_MD; do
            base="${md%.md}"
            action="${base}.actions.json"
            if git ls-tree -r --name-only "$AFTER" | grep -qx "$action"; then
              FILES+=("$action")
            else
              echo "::error::Missing required actions artifact for $md. Expected $action"
              MISSING+=("$md")
            fi
          done

          for action in $CHANGED_ACTIONS; do
            FILES+=("$action")
          done

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "Missing actions files detected: ${MISSING[*]}"
            exit 1
          fi

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No changed action files detected."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UNIQUE_FILES=$(printf "%s\n" "${FILES[@]}" | sort -u | tr '\n' ' ')
          echo "Changed files:"
          echo "$UNIQUE_FILES" | tr ' ' '\n'
          printf "files=%s\n" "$UNIQUE_FILES" >> "$GITHUB_OUTPUT"

      - name: Validate action files
        if: steps.changed.outputs.files != ''
        run: |
          node scripts/ingest-claude-review.js --mode validate --schema design-reviews/claude-review.schema.json ${{ steps.changed.outputs.files }}

      - name: Ingest review findings
        if: steps.changed.outputs.files != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ingest-claude-review.js --mode ingest --schema design-reviews/claude-review.schema.json ${{ steps.changed.outputs.files }}
