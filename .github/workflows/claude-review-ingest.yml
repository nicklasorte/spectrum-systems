name: claude-review-ingest

on:
  push:
    paths:
      - 'design-reviews/*.actions.json'

permissions:
  contents: read
  issues: write

jobs:
  ingest-claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install validation dependencies
        run: npm install --no-save --no-package-lock ajv@^8 ajv-formats@^2

      - name: Detect changed Claude review action files
        id: changed
        shell: bash
        run: |
          set -eo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            CHANGED=$(git ls-tree -r --name-only "$AFTER" | grep '^design-reviews/.*\.actions.json$' || true)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- 'design-reviews/*.actions.json')
          fi

          if [ -z "$CHANGED" ]; then
            echo "No changed action files detected."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"
          printf "files=%s\n" "$(echo "$CHANGED" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Validate action files (schema + pairing)
        if: steps.changed.outputs.files != ''
        run: |
          node scripts/ingest-claude-review.js --mode validate --schema design-reviews/claude-review.schema.json ${{ steps.changed.outputs.files }}

      - name: Ingest review findings
        if: steps.changed.outputs.files != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ingest-claude-review.js --mode ingest --schema design-reviews/claude-review.schema.json ${{ steps.changed.outputs.files }}
