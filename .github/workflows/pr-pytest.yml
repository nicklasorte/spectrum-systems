name: pr-gate

on:
  pull_request:

permissions:
  contents: read

jobs:
  pr-gate:
    name: pr-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Resolve refs
        id: refs
        run: |
          echo "base_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          echo "head_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

      - name: Run canonical PR gate
        run: |
          python scripts/run_pr_gate.py \
            --base-ref "${{ steps.refs.outputs.base_ref }}" \
            --head-ref "${{ steps.refs.outputs.head_ref }}" \
            --output-dir outputs/pr_gate

      - name: Upload PR gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-artifacts
          if-no-files-found: warn
          path: |
            outputs/pr_gate/pr_gate_result.json
            outputs/contract_gate/contract_gate_result.json
            outputs/test_selection_gate/test_selection_gate_result.json
            outputs/runtime_test_gate/runtime_test_gate_result.json
            outputs/governance_gate/governance_gate_result.json
            outputs/certification_gate/certification_gate_result.json
            outputs/contract_preflight/contract_preflight_result_artifact.json
