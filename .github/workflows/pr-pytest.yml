name: PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  shard-select:
    name: shard-select (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [contract, governance, dashboard, changed_scope]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Resolve preflight refs
        id: shard-refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "base_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=origin/main" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Select tests for shard
        id: shard-select
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          GITHUB_BEFORE_SHA: ${{ github.event.before || '' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p outputs/pr_test_shards/${{ matrix.shard }}
          python scripts/select_pr_test_shard.py \
            --mode ci \
            --shard "${{ matrix.shard }}" \
            --base-ref "${{ steps.shard-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.shard-refs.outputs.head_ref }}" \
            --output "outputs/pr_test_shards/${{ matrix.shard }}/${{ matrix.shard }}_selection.json"

      - name: Run shard tests
        id: shard-run
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, subprocess, sys, time
          from pathlib import Path

          shard = "${{ matrix.shard }}"
          selection_path = Path(f"outputs/pr_test_shards/{shard}/{shard}_selection.json")
          result_path = Path(f"outputs/pr_test_shards/{shard}/{shard}_result.json")
          result_path.parent.mkdir(parents=True, exist_ok=True)

          if not selection_path.is_file():
              sys.exit(f"missing selection artifact: {selection_path}")
          selection = json.loads(selection_path.read_text(encoding="utf-8"))
          selected = selection.get("selected_test_files") or []
          sel_status = selection.get("status", "block")

          start = time.monotonic()
          commands_run = []
          failure_summary = None
          result_status = "pass"

          if sel_status == "empty_allowed" or not selected:
              result_status = "skipped" if sel_status == "empty_allowed" else "pass"
          else:
              cmd = [sys.executable, "-m", "pytest", "-q"] + selected
              commands_run.append(" ".join(cmd))
              proc = subprocess.run(cmd, check=False)
              if proc.returncode != 0:
                  result_status = "fail"
                  failure_summary = f"pytest exited {proc.returncode}"

          duration_ms = int((time.monotonic() - start) * 1000)
          result = {
              "artifact_type": "pr_test_shard_result",
              "schema_version": "1.0.0",
              "shard_name": shard,
              "status": result_status,
              "selected_tests": selected,
              "commands_run": commands_run,
              "duration_ms": duration_ms,
              "failure_summary": failure_summary,
              "artifact_refs": [str(selection_path)],
              "trace_refs": [],
              "authority_scope": "observation_only",
          }
          result_path.write_text(json.dumps(result, indent=2) + "\n", encoding="utf-8")
          if result_status in ("fail", "block"):
              sys.exit(1)
          PY

      - name: Upload shard outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shard-outputs-${{ matrix.shard }}
          if-no-files-found: warn
          path: outputs/pr_test_shards

  pr-gate:
    name: pr-gate
    needs: shard-select
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Download all shard outputs
        uses: actions/download-artifact@v4
        with:
          pattern: shard-outputs-*
          merge-multiple: true
          path: outputs/pr_test_shards

      - name: Run PR gate aggregator
        run: |
          set -euo pipefail
          mkdir -p outputs/pr_gate
          python scripts/run_pr_gate.py \
            --shard-dir outputs/pr_test_shards \
            --required-shards contract,governance,dashboard,changed_scope \
            --shard-matrix-result "${{ needs.shard-select.result }}" \
            --output outputs/pr_gate/pr_gate_result.json

      - name: Upload PR gate result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-result
          if-no-files-found: warn
          path: outputs/pr_gate/pr_gate_result.json

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Resolve preflight refs
        id: preflight-refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "base_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=origin/main" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Run governed pytest preflight gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          GITHUB_BEFORE_SHA: ${{ github.event.before || '' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python scripts/build_preflight_pqx_wrapper.py \
            --base-ref "${{ steps.preflight-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.preflight-refs.outputs.head_ref }}" \
            --output outputs/contract_preflight/preflight_pqx_task_wrapper.json

          set +e
          python scripts/run_contract_preflight.py \
            --base-ref "${{ steps.preflight-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.preflight-refs.outputs.head_ref }}" \
            --output-dir outputs/contract_preflight \
            --execution-context pqx_governed \
            --pqx-wrapper-path outputs/contract_preflight/preflight_pqx_task_wrapper.json \
            --authority-evidence-ref artifacts/pqx_runs/preflight.pqx_slice_execution_record.json
          preflight_exit=$?
          set -e

          if [[ "$preflight_exit" -ne 0 ]]; then
            auto_repair_allowed=$(python - <<'PY'
import json
from pathlib import Path
path = Path("outputs/contract_preflight/preflight_repair_plan_record.json")
if not path.is_file():
    print("false")
else:
    payload = json.loads(path.read_text(encoding="utf-8"))
    print("true" if payload.get("eligibility_decision") == "auto_repair_allowed" else "false")
PY
)

            if [[ "$auto_repair_allowed" != "true" ]]; then
              exit "$preflight_exit"
            fi

            python scripts/run_github_pr_autofix_contract_preflight.py \
            --output-dir outputs/contract_preflight \
            --base-ref "${{ steps.preflight-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.preflight-refs.outputs.head_ref }}" \
            --event-name "${{ github.event_name }}" \
            --execution-context pqx_governed \
            --pqx-wrapper-path outputs/contract_preflight/preflight_pqx_task_wrapper.json \
            --authority-evidence-ref artifacts/pqx_runs/preflight.pqx_slice_execution_record.json \
            --same-repo-write-allowed
          fi

          # Preflight is the canonical authority for PR pytest execution truth.
          python - <<'PY'
import json
import os
from pathlib import Path

artifact = Path("outputs/contract_preflight/contract_preflight_result_artifact.json")
if not artifact.is_file():
    raise SystemExit("missing contract_preflight_result_artifact.json")
payload = json.loads(artifact.read_text(encoding="utf-8"))
decision = str((payload.get("control_signal") or {}).get("strategy_gate_decision") or "BLOCK")
execution = payload.get("pytest_execution") or {}
count = int(execution.get("pytest_execution_count") or 0)
record_ref = str(payload.get("pytest_execution_record_ref") or "").strip()
if os.environ.get("GITHUB_EVENT_NAME") == "pull_request":
    if not record_ref:
        raise SystemExit("workflow/preflight trust mismatch: missing pytest_execution_record_ref")
    record_path = Path(record_ref)
    if not record_path.is_file():
        raise SystemExit(f"workflow/preflight trust mismatch: missing pytest_execution_record artifact at {record_ref}")
    record = json.loads(record_path.read_text(encoding="utf-8"))
    executed = bool(record.get("executed", False))
    selected_targets = record.get("selected_targets") or []
    if decision == "WARN":
        raise SystemExit("workflow/preflight trust mismatch: WARN is not pass-equivalent for pull_request")
    if decision == "ALLOW" and count < 1:
        raise SystemExit("workflow/preflight trust mismatch: PR allow without preflight-owned pytest execution")
    if decision == "ALLOW" and not executed:
        raise SystemExit("workflow/preflight trust mismatch: PR allow with executed=false")
    if decision == "ALLOW" and not selected_targets:
        raise SystemExit("workflow/preflight trust mismatch: PR allow with empty selected_targets")
    if record_ref != "outputs/contract_preflight/pytest_execution_record.json":
        raise SystemExit("workflow/preflight trust mismatch: non-canonical pytest_execution_record_ref")
    required_execution_provenance = [
        "source_commit_sha",
        "source_head_ref",
        "workflow_run_id",
        "producer_script",
        "produced_at",
        "artifact_hash",
    ]
    if any(not str(record.get(field) or "").strip() for field in required_execution_provenance):
        raise SystemExit("workflow/preflight trust mismatch: missing pytest_execution_record provenance fields")
    selection_ref = str(payload.get("pytest_selection_integrity_result_ref") or "").strip()
    selection = payload.get("pytest_selection_integrity") or {}
    if not selection_ref:
        raise SystemExit("workflow/preflight trust mismatch: missing pytest_selection_integrity_result_ref")
    if selection_ref != "outputs/contract_preflight/pytest_selection_integrity_result.json":
        raise SystemExit("workflow/preflight trust mismatch: non-canonical pytest_selection_integrity_result_ref")
    selection_path = Path(selection_ref)
    if not selection_path.is_file():
        raise SystemExit(f"workflow/preflight trust mismatch: missing pytest_selection_integrity_result artifact at {selection_ref}")
    selection_from_ref = json.loads(selection_path.read_text(encoding="utf-8"))
    required_selection_provenance = required_execution_provenance + [
        "source_pytest_execution_record_ref",
        "source_pytest_execution_record_hash",
    ]
    if any(not str(selection_from_ref.get(field) or "").strip() for field in required_selection_provenance):
        raise SystemExit("workflow/preflight trust mismatch: missing pytest_selection_integrity_result provenance fields")
    if str(selection_from_ref.get("source_pytest_execution_record_ref") or "") != record_ref:
        raise SystemExit("workflow/preflight trust mismatch: selection provenance record ref mismatch")
    if str(selection_from_ref.get("source_pytest_execution_record_hash") or "") != str(record.get("artifact_hash") or ""):
        raise SystemExit("workflow/preflight trust mismatch: selection provenance record hash mismatch")
    if str(selection_from_ref.get("source_commit_sha") or "") != str(record.get("source_commit_sha") or ""):
        raise SystemExit("workflow/preflight trust mismatch: selection provenance commit mismatch")
    if str(selection_from_ref.get("selection_integrity_decision") or "BLOCK") != "ALLOW" and decision == "ALLOW":
        raise SystemExit("workflow/preflight trust mismatch: allow decision with blocked pytest selection integrity")
    if selection and str(selection.get("selection_integrity_decision") or "BLOCK") != "ALLOW" and decision == "ALLOW":
        raise SystemExit("workflow/preflight trust mismatch: allow decision with in-artifact blocked pytest selection integrity")
PY

      - name: Upload contract preflight outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-preflight-outputs
          if-no-files-found: warn
          path: |
            outputs/contract_preflight/contract_preflight_report.md
            outputs/contract_preflight/contract_preflight_report.json
            outputs/contract_preflight/contract_preflight_result_artifact.json
            outputs/contract_preflight/system_registry_guard_result.json
            outputs/contract_preflight/contract_preflight_diagnosis_bundle.md

