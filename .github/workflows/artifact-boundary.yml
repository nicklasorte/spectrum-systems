name: artifact-boundary

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'codex/**'
  pull_request:

permissions:
  contents: read

jobs:
  enforce-artifact-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Enforce artifact boundary
        run: python scripts/check_artifact_boundary.py

  run-pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest
