name: artifact-boundary

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'codex/**'
  pull_request:

permissions:
  contents: read

jobs:
  enforce-artifact-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Enforce artifact boundary
        run: python scripts/check_artifact_boundary.py

  validate-module-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate module architecture
        run: python scripts/validate_module_architecture.py

  validate-orchestration-boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate orchestration boundaries and artifact-bus schema
        run: python scripts/validate_orchestration_boundaries.py

  contract-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Resolve preflight refs
        id: preflight-refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "base_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=origin/main" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Run contract preflight gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          GITHUB_BEFORE_SHA: ${{ github.event.before || '' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python scripts/build_preflight_pqx_wrapper.py \
            --base-ref "${{ steps.preflight-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.preflight-refs.outputs.head_ref }}" \
            --output outputs/contract_preflight/preflight_pqx_task_wrapper.json

          set +e
          python scripts/run_contract_preflight.py \
            --base-ref "${{ steps.preflight-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.preflight-refs.outputs.head_ref }}" \
            --output-dir outputs/contract_preflight \
            --execution-context pqx_governed \
            --pqx-wrapper-path outputs/contract_preflight/preflight_pqx_task_wrapper.json \
            --authority-evidence-ref artifacts/pqx_runs/preflight.pqx_slice_execution_record.json
          preflight_exit=$?
          set -e

          if [[ "$preflight_exit" -ne 0 ]]; then
            auto_repair_allowed=$(python - <<'PY'
import json
from pathlib import Path
path = Path("outputs/contract_preflight/preflight_repair_plan_record.json")
if not path.is_file():
    print("false")
else:
    payload = json.loads(path.read_text(encoding="utf-8"))
    print("true" if payload.get("eligibility_decision") == "auto_repair_allowed" else "false")
PY
)

            if [[ "$auto_repair_allowed" != "true" ]]; then
              exit "$preflight_exit"
            fi

            python scripts/run_github_pr_autofix_contract_preflight.py \
            --output-dir outputs/contract_preflight \
            --base-ref "${{ steps.preflight-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.preflight-refs.outputs.head_ref }}" \
            --event-name "${{ github.event_name }}" \
            --execution-context pqx_governed \
            --pqx-wrapper-path outputs/contract_preflight/preflight_pqx_task_wrapper.json \
            --authority-evidence-ref artifacts/pqx_runs/preflight.pqx_slice_execution_record.json \
            --same-repo-write-allowed
          fi

          # Preflight is the canonical authority for PR pytest execution truth.
          python - <<'PY'
import json
import os
from pathlib import Path

artifact = Path("outputs/contract_preflight/contract_preflight_result_artifact.json")
if not artifact.is_file():
    raise SystemExit("missing contract_preflight_result_artifact.json")
payload = json.loads(artifact.read_text(encoding="utf-8"))
decision = str((payload.get("control_signal") or {}).get("strategy_gate_decision") or "BLOCK")
execution = payload.get("pytest_execution") or {}
count = int(execution.get("pytest_execution_count") or 0)
record_ref = str(payload.get("pytest_execution_record_ref") or "").strip()
if os.environ.get("GITHUB_EVENT_NAME") == "pull_request":
    if not record_ref:
        raise SystemExit("workflow/preflight trust mismatch: missing pytest_execution_record_ref")
    record_path = Path(record_ref)
    if not record_path.is_file():
        raise SystemExit(f"workflow/preflight trust mismatch: missing pytest_execution_record artifact at {record_ref}")
    record = json.loads(record_path.read_text(encoding="utf-8"))
    executed = bool(record.get("executed", False))
    selected_targets = record.get("selected_targets") or []
    if decision in {"ALLOW", "WARN"} and count < 1:
        raise SystemExit("workflow/preflight trust mismatch: PR allow without preflight-owned pytest execution")
    if decision in {"ALLOW", "WARN"} and not executed:
        raise SystemExit("workflow/preflight trust mismatch: PR allow with executed=false")
    if decision in {"ALLOW", "WARN"} and not selected_targets:
        raise SystemExit("workflow/preflight trust mismatch: PR allow with empty selected_targets")
    selection_ref = str(payload.get("pytest_selection_integrity_result_ref") or "").strip()
    selection = payload.get("pytest_selection_integrity") or {}
    if not selection_ref:
        raise SystemExit("workflow/preflight trust mismatch: missing pytest_selection_integrity_result_ref")
    selection_path = Path(selection_ref)
    if not selection_path.is_file():
        raise SystemExit(f"workflow/preflight trust mismatch: missing pytest_selection_integrity_result artifact at {selection_ref}")
    selection_from_ref = json.loads(selection_path.read_text(encoding="utf-8"))
    if str(selection_from_ref.get("selection_integrity_decision") or "BLOCK") != "ALLOW" and decision in {"ALLOW", "WARN"}:
        raise SystemExit("workflow/preflight trust mismatch: allow decision with blocked pytest selection integrity")
    if selection and str(selection.get("selection_integrity_decision") or "BLOCK") != "ALLOW" and decision in {"ALLOW", "WARN"}:
        raise SystemExit("workflow/preflight trust mismatch: allow decision with in-artifact blocked pytest selection integrity")
PY

      - name: Upload contract preflight outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-preflight-outputs
          if-no-files-found: warn
          path: |
            outputs/contract_preflight/contract_preflight_report.md
            outputs/contract_preflight/contract_preflight_report.json
            outputs/contract_preflight/contract_preflight_result_artifact.json
            outputs/contract_preflight/system_registry_guard_result.json
            outputs/contract_preflight/contract_preflight_diagnosis_bundle.md

  system-registry-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Resolve changed refs
        id: srg-refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "base_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=origin/main" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Run system registry guard
        run: |
          python scripts/run_system_registry_guard.py \
            --base-ref "${{ steps.srg-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.srg-refs.outputs.head_ref }}" \
            --output outputs/system_registry_guard/system_registry_guard_result.json

      - name: Upload system registry guard outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-registry-guard-outputs
          if-no-files-found: warn
          path: outputs/system_registry_guard/system_registry_guard_result.json

  run-pytest:
    needs:
      - enforce-artifact-boundary
      - validate-module-architecture
      - validate-orchestration-boundaries
      - contract-preflight
      - system-registry-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest
        # Non-authoritative redundancy signal only.
        # PR gating execution truth is owned by contract-preflight artifacts.
        run: pytest
