name: artifact-boundary

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'codex/**'
  pull_request:

permissions:
  contents: read

jobs:
  enforce-artifact-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Enforce artifact boundary
        run: python scripts/check_artifact_boundary.py

  validate-module-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate module architecture
        run: python scripts/validate_module_architecture.py

  validate-orchestration-boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate orchestration boundaries and artifact-bus schema
        run: python scripts/validate_orchestration_boundaries.py


  system-registry-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Resolve changed refs
        id: srg-refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "base_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=origin/main" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan authority-shape preflight diagnostics (AGS-001)
        run: |
          python scripts/run_authority_shape_preflight.py \
            --base-ref "${{ steps.srg-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.srg-refs.outputs.head_ref }}" \
            --suggest-only \
            --output outputs/authority_shape_preflight/authority_shape_preflight_result.json
      - name: Run authority drift guard (shift-left)
        run: |
          python scripts/run_authority_drift_guard.py \
            --base-ref "${{ steps.srg-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.srg-refs.outputs.head_ref }}" \
            --output outputs/authority_drift_guard/authority_drift_guard_result.json

      - name: Run system registry guard
        run: |
          python scripts/run_system_registry_guard.py \
            --base-ref "${{ steps.srg-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.srg-refs.outputs.head_ref }}" \
            --output outputs/system_registry_guard/system_registry_guard_result.json

      - name: Run authority leak guard
        run: |
          python scripts/run_authority_leak_guard.py \
            --base-ref "${{ steps.srg-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.srg-refs.outputs.head_ref }}" \
            --output outputs/authority_leak_guard/authority_leak_guard_result.json

      - name: Upload system registry guard outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-registry-guard-outputs
          if-no-files-found: warn
          path: outputs/system_registry_guard/system_registry_guard_result.json

      - name: Upload authority leak guard outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authority-leak-guard-outputs
          if-no-files-found: warn
          path: outputs/authority_leak_guard/authority_leak_guard_result.json

      - name: Upload authority shape preflight outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authority-shape-preflight-outputs
          if-no-files-found: warn
          path: outputs/authority_shape_preflight/authority_shape_preflight_result.json

  governed-contract-preflight:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs:
      - enforce-artifact-boundary
      - validate-module-architecture
      - validate-orchestration-boundaries
      - system-registry-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Resolve preflight refs
        id: preflight-refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
            head_ref="${{ github.event.pull_request.head.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            base_ref="${{ github.event.before }}"
            head_ref="${{ github.sha }}"
          else
            echo "ERROR: unsupported event ${GITHUB_EVENT_NAME} for governed contract preflight" >&2
            exit 2
          fi
          if [[ -z "${base_ref}" || -z "${head_ref}" ]]; then
            echo "ERROR: empty base_ref/head_ref derived for ${GITHUB_EVENT_NAME} (base='${base_ref}' head='${head_ref}')" >&2
            exit 2
          fi
          echo "base_ref=${base_ref}" >> "$GITHUB_OUTPUT"
          echo "head_ref=${head_ref}" >> "$GITHUB_OUTPUT"

      - name: Build derived registry artifacts (PQX freshness gate — build phase)
        run: |
          set -euo pipefail
          mkdir -p outputs/freshness_gate_debug
          python --version 2>&1 | tee outputs/freshness_gate_debug/trace.txt
          echo "build_start" | tee -a outputs/freshness_gate_debug/trace.txt
          python scripts/build_tls_dependency_priority.py \
            --out artifacts/tls \
            --top-level-out artifacts \
            --candidates "" \
            2>&1 | tee -a outputs/freshness_gate_debug/trace.txt
          echo "build_complete" | tee -a outputs/freshness_gate_debug/trace.txt
          python scripts/generate_ecosystem_health_report.py \
            2>&1 | tee -a outputs/freshness_gate_debug/trace.txt
          echo "health_complete" | tee -a outputs/freshness_gate_debug/trace.txt

      - name: Verify derived registry artifacts are structurally current (PQX freshness gate — compare phase)
        run: |
          set -euo pipefail
          # Compare structure only — strip volatile timestamp fields before diffing
          # so the check is stable across reruns on identical source inputs.
          python - <<'PYCODE'
          import json, subprocess, sys
          from pathlib import Path

          VOLATILE = {"generated_at", "created_at", "last_updated", "run_at", "timestamp"}
          JSON_FILES = [
              "artifacts/tls/system_dependency_priority_report.json",
              "artifacts/tls/system_evidence_attachment.json",
              "artifacts/system_dependency_priority_report.json",
              "governance/reports/ecosystem-health.json",
          ]

          def normalize(obj):
              if isinstance(obj, dict):
                  return {k: normalize(v) for k, v in sorted(obj.items()) if k not in VOLATILE}
              if isinstance(obj, list):
                  return [normalize(x) for x in obj]
              return obj

          def first_diff(a, b, path=""):
              if type(a) != type(b):
                  return f"{path}: type {type(a).__name__} vs {type(b).__name__}"
              if isinstance(a, dict):
                  for k in set(list(a.keys()) + list(b.keys())):
                      if k not in a:
                          return f"{path}.{k}: missing in committed"
                      if k not in b:
                          return f"{path}.{k}: missing in current"
                      r = first_diff(a[k], b[k], f"{path}.{k}")
                      if r:
                          return r
              elif isinstance(a, list):
                  if len(a) != len(b):
                      return f"{path}: list len {len(a)} vs {len(b)}"
                  for i, (x, y) in enumerate(zip(a, b)):
                      r = first_diff(x, y, f"{path}[{i}]")
                      if r:
                          return r
              elif a != b:
                  av = repr(a)[:80]
                  bv = repr(b)[:80]
                  return f"{path}: committed={av!r} current={bv!r}"
              return None

          debug_dir = Path("outputs/freshness_gate_debug")
          debug_dir.mkdir(parents=True, exist_ok=True)
          lines = []
          mismatches = []
          for rel in JSON_FILES:
              path = Path(rel)
              if not path.is_file():
                  lines.append(f"SKIP (missing on disk): {rel}")
                  print(lines[-1])
                  continue
              result = subprocess.run(
                  ["git", "show", f"HEAD:{rel}"],
                  capture_output=True, text=True,
              )
              if result.returncode != 0:
                  lines.append(f"SKIP (not in HEAD, rc={result.returncode}): {rel}")
                  print(lines[-1])
                  continue  # new file on this branch — skip
              try:
                  committed = normalize(json.loads(result.stdout))
                  current   = normalize(json.loads(path.read_text()))
              except Exception as e:
                  lines.append(f"SKIP (parse error {e}): {rel}")
                  print(lines[-1])
                  continue
              if committed != current:
                  diff_hint = first_diff(committed, current)
                  lines.append(f"MISMATCH: {rel} — first diff: {diff_hint}")
                  print(lines[-1])
                  mismatches.append(rel)
              else:
                  lines.append(f"OK: {rel}")
                  print(lines[-1])

          (debug_dir / "comparison_result.txt").write_text("\n".join(lines) + "\n")

          if mismatches:
              print("ERROR: derived registry artifacts have structural differences from HEAD.")
              print("Run locally, commit, and push:")
              print("  python scripts/build_tls_dependency_priority.py --out artifacts/tls --top-level-out artifacts --candidates ''")
              print("  python scripts/generate_ecosystem_health_report.py")
              for m in mismatches:
                  print(f"  stale: {m}")
              sys.exit(1)

          print("Derived registry artifacts are structurally up-to-date.")
          PYCODE

      - name: Upload freshness gate debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freshness-gate-debug
          if-no-files-found: warn
          path: outputs/freshness_gate_debug/

      - name: Run authoritative governed preflight gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          GITHUB_BEFORE_SHA: ${{ github.event.before || '' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python scripts/build_preflight_pqx_wrapper.py \
            --base-ref "${{ steps.preflight-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.preflight-refs.outputs.head_ref }}" \
            --output outputs/contract_preflight/preflight_pqx_task_wrapper.json

          python scripts/run_contract_preflight.py \
            --base-ref "${{ steps.preflight-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.preflight-refs.outputs.head_ref }}" \
            --output-dir outputs/contract_preflight \
            --execution-context pqx_governed \
            --pqx-wrapper-path outputs/contract_preflight/preflight_pqx_task_wrapper.json \
            --authority-evidence-ref artifacts/pqx_runs/preflight.pqx_slice_execution_record.json

      - name: Upload contract preflight outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-preflight-outputs-${{ github.event_name }}
          if-no-files-found: warn
          path: |
            outputs/contract_preflight/contract_preflight_report.md
            outputs/contract_preflight/contract_preflight_report.json
            outputs/contract_preflight/contract_preflight_result_artifact.json
            outputs/contract_preflight/system_registry_guard_result.json
            outputs/contract_preflight/contract_preflight_diagnosis_bundle.md

  run-pytest:
    needs:
      - enforce-artifact-boundary
      - validate-module-architecture
      - validate-orchestration-boundaries
      - system-registry-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest
        # Non-authoritative redundancy signal only.
        # PR gating execution truth is owned by contract-preflight artifacts.
        run: pytest
