name: artifact-boundary

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'codex/**'
  pull_request:

permissions:
  contents: read

jobs:
  enforce-artifact-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Enforce artifact boundary
        run: python scripts/check_artifact_boundary.py

  validate-module-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate module architecture
        run: python scripts/validate_module_architecture.py

  validate-orchestration-boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate orchestration boundaries and artifact-bus schema
        run: python scripts/validate_orchestration_boundaries.py


  system-registry-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Resolve changed refs
        id: srg-refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "base_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=origin/main" >> "$GITHUB_OUTPUT"
            echo "head_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan authority-shape preflight diagnostics (AGS-001)
        run: |
          python scripts/run_authority_shape_preflight.py \
            --base-ref "${{ steps.srg-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.srg-refs.outputs.head_ref }}" \
            --suggest-only \
            --output outputs/authority_shape_preflight/authority_shape_preflight_result.json
      - name: Run authority drift guard (shift-left)
        run: |
          python scripts/run_authority_drift_guard.py \
            --base-ref "${{ steps.srg-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.srg-refs.outputs.head_ref }}" \
            --output outputs/authority_drift_guard/authority_drift_guard_result.json

      - name: Run system registry guard
        run: |
          python scripts/run_system_registry_guard.py \
            --base-ref "${{ steps.srg-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.srg-refs.outputs.head_ref }}" \
            --output outputs/system_registry_guard/system_registry_guard_result.json

      - name: Run authority leak guard
        run: |
          python scripts/run_authority_leak_guard.py \
            --base-ref "${{ steps.srg-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.srg-refs.outputs.head_ref }}" \
            --output outputs/authority_leak_guard/authority_leak_guard_result.json

      - name: Upload system registry guard outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-registry-guard-outputs
          if-no-files-found: warn
          path: outputs/system_registry_guard/system_registry_guard_result.json

      - name: Upload authority leak guard outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authority-leak-guard-outputs
          if-no-files-found: warn
          path: outputs/authority_leak_guard/authority_leak_guard_result.json

      - name: Upload authority shape preflight outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authority-shape-preflight-outputs
          if-no-files-found: warn
          path: outputs/authority_shape_preflight/authority_shape_preflight_result.json

  governed-contract-preflight:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs:
      - enforce-artifact-boundary
      - validate-module-architecture
      - validate-orchestration-boundaries
      - system-registry-guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Resolve preflight refs
        id: preflight-refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
            head_ref="${{ github.event.pull_request.head.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            base_ref="${{ github.event.before }}"
            head_ref="${{ github.sha }}"
          else
            echo "ERROR: unsupported event ${GITHUB_EVENT_NAME} for governed contract preflight" >&2
            exit 2
          fi
          if [[ -z "${base_ref}" || -z "${head_ref}" ]]; then
            echo "ERROR: empty base_ref/head_ref derived for ${GITHUB_EVENT_NAME} (base='${base_ref}' head='${head_ref}')" >&2
            exit 2
          fi
          echo "base_ref=${base_ref}" >> "$GITHUB_OUTPUT"
          echo "head_ref=${head_ref}" >> "$GITHUB_OUTPUT"

      - name: Regenerate and check derived registry artifacts (PQX freshness gate)
        run: |
          set -euo pipefail
          python scripts/build_tls_dependency_priority.py \
            --out artifacts/tls \
            --top-level-out artifacts \
            --candidates ""
          python scripts/generate_ecosystem_health_report.py
          # Compare structure only — strip volatile timestamp fields before diffing
          # so the check is stable across reruns on identical source inputs.
          python - <<'PYCODE'
          import hashlib, json, subprocess, sys
          from pathlib import Path

          print(f"[diag] Python version: {sys.version}", flush=True)

          VOLATILE = {"generated_at", "created_at", "last_updated", "run_at", "timestamp"}
          JSON_FILES = [
              "artifacts/tls/system_dependency_priority_report.json",
              "artifacts/tls/system_evidence_attachment.json",
              "artifacts/system_dependency_priority_report.json",
              "governance/reports/ecosystem-health.json",
          ]

          def normalize(obj):
              if isinstance(obj, dict):
                  return {k: normalize(v) for k, v in sorted(obj.items()) if k not in VOLATILE}
              if isinstance(obj, list):
                  items = [normalize(x) for x in obj]
                  try:
                      return sorted(items, key=lambda x: json.dumps(x, sort_keys=True) if not isinstance(x, (str, int, float, bool, type(None))) else str(x))
                  except TypeError:
                      return items
              return obj

          def _md5(s: str) -> str:
              return hashlib.md5(s.encode()).hexdigest()

          mismatches = []
          for rel in JSON_FILES:
              path = Path(rel)
              if not path.is_file():
                  print(f"[diag] {rel}: file not present on disk — skipping", flush=True)
                  continue
              result = subprocess.run(
                  ["git", "show", f"HEAD:{rel}"],
                  capture_output=True, text=True,
              )
              if result.returncode != 0:
                  print(f"[diag] {rel}: not in HEAD — new file, skipping", flush=True)
                  continue
              try:
                  raw_committed = result.stdout
                  raw_current   = path.read_text()
                  committed_raw_hash = _md5(raw_committed)
                  current_raw_hash   = _md5(raw_current)
                  print(f"[diag] {rel}: raw committed_md5={committed_raw_hash} current_md5={current_raw_hash} raw_match={committed_raw_hash==current_raw_hash}", flush=True)
                  committed = normalize(json.loads(raw_committed))
                  current   = normalize(json.loads(raw_current))
                  committed_norm_hash = _md5(json.dumps(committed, sort_keys=True))
                  current_norm_hash   = _md5(json.dumps(current,   sort_keys=True))
                  print(f"[diag] {rel}: norm committed_md5={committed_norm_hash} current_md5={current_norm_hash} norm_match={committed_norm_hash==current_norm_hash}", flush=True)
              except Exception as exc:
                  print(f"WARN: could not parse {rel}: {exc}")
                  continue
              if committed != current:
                  mismatches.append(rel)
                  # Emit structural diff for diagnosis
                  import difflib
                  committed_lines = json.dumps(committed, indent=2, sort_keys=True).splitlines(keepends=True)
                  current_lines   = json.dumps(current,   indent=2, sort_keys=True).splitlines(keepends=True)
                  diff = list(difflib.unified_diff(committed_lines, current_lines,
                                                    fromfile=f"HEAD:{rel}", tofile=f"regen:{rel}",
                                                    n=4))
                  print(f"--- structural diff for {rel} (first 80 lines) ---")
                  print("".join(diff[:80]))

          if mismatches:
              print("ERROR: derived registry artifacts have structural differences from HEAD.")
              print("Run locally, commit, and push:")
              print("  python scripts/build_tls_dependency_priority.py --out artifacts/tls --top-level-out artifacts --candidates ''")
              print("  python scripts/generate_ecosystem_health_report.py")
              for m in mismatches:
                  print(f"  stale: {m}")
              sys.exit(1)

          print("Derived registry artifacts are structurally up-to-date.")
          PYCODE

      - name: Run authoritative governed preflight gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          GITHUB_BEFORE_SHA: ${{ github.event.before || '' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python scripts/build_preflight_pqx_wrapper.py \
            --base-ref "${{ steps.preflight-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.preflight-refs.outputs.head_ref }}" \
            --output outputs/contract_preflight/preflight_pqx_task_wrapper.json

          python scripts/run_contract_preflight.py \
            --base-ref "${{ steps.preflight-refs.outputs.base_ref }}" \
            --head-ref "${{ steps.preflight-refs.outputs.head_ref }}" \
            --output-dir outputs/contract_preflight \
            --execution-context pqx_governed \
            --pqx-wrapper-path outputs/contract_preflight/preflight_pqx_task_wrapper.json \
            --authority-evidence-ref artifacts/pqx_runs/preflight.pqx_slice_execution_record.json

      - name: Upload contract preflight outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-preflight-outputs-${{ github.event_name }}
          if-no-files-found: warn
          path: |
            outputs/contract_preflight/contract_preflight_report.md
            outputs/contract_preflight/contract_preflight_report.json
            outputs/contract_preflight/contract_preflight_result_artifact.json
            outputs/contract_preflight/system_registry_guard_result.json
            outputs/contract_preflight/contract_preflight_diagnosis_bundle.md

      - name: Post preflight diagnosis to PR + step summary on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set +e
          # Use a separate Python file to avoid YAML/heredoc indentation issues.
          cat <<'PYEOF' > /tmp/diag_summarize.py
          import json, sys
          path = sys.argv[1]
          mode = sys.argv[2] if len(sys.argv) > 2 else "summary"
          try:
              d = json.load(open(path))
          except Exception as exc:
              print(json.dumps({"error": f"failed to load {path}: {exc}"}, indent=2))
              sys.exit(0)
          if mode == "result_artifact":
              out = {
                  "preflight_status": d.get("preflight_status"),
                  "control_signal": d.get("control_signal"),
                  "recommended_repair_area": d.get("recommended_repair_area"),
                  "control_surface_gap_status": d.get("control_surface_gap_status"),
                  "pytest_execution": d.get("pytest_execution"),
              }
          elif mode == "report_summary":
              out = {
                  "status": d.get("status"),
                  "changed_examples": d.get("changed_examples"),
                  "schema_example_failures": d.get("schema_example_failures"),
                  "producer_failures_count": len(d.get("producer_failures") or []),
                  "fixture_failures_count": len(d.get("fixture_failures") or []),
                  "consumer_failures_count": len(d.get("consumer_failures") or []),
                  "missing_required_surface": (d.get("missing_required_surface") or [])[:20],
                  "invariant_violations": d.get("invariant_violations"),
                  "skip_reason": d.get("skip_reason"),
                  "evaluation_classification": d.get("evaluation_classification"),
                  "recommended_repair_areas": d.get("recommended_repair_areas"),
                  "ref_context": d.get("ref_context"),
                  "changed_path_detection": d.get("changed_path_detection"),
                  "impact": d.get("impact"),
                  "bootstrap_failures": d.get("bootstrap_failures"),
                  "pqx_execution_policy": d.get("pqx_execution_policy"),
                  "secondary_exception": (d.get("secondary_exception") or "")[:1500] if isinstance(d.get("secondary_exception"), str) else d.get("secondary_exception"),
              }
          elif mode == "producer_failures":
              parts = []
              for f in (d.get("producer_failures") or [])[:3]:
                  parts.append(f"=== {f.get('path')} (rc={f.get('returncode')}) ===")
                  parts.append((f.get("output") or "")[:2500])
                  parts.append("")
              print("\n".join(parts))
              sys.exit(0)
          else:
              out = {"unknown_mode": mode}
          print(json.dumps(out, indent=2)[:10000])
          PYEOF
          # Use sed to strip the leading 10 spaces of YAML indentation that the heredoc preserves
          sed -i 's/^          //' /tmp/diag_summarize.py
          {
            echo "## governed-contract-preflight failure diagnosis"
            echo
            echo "Commit: \`${{ github.sha }}\`"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Event: \`${{ github.event_name }}\`"
            echo
            echo "### outputs/contract_preflight/ directory listing"
            echo '```'
            ls -la outputs/contract_preflight/ 2>&1 | head -30
            echo '```'
            echo
            echo "### contract_preflight_result_artifact.json (top-level signal)"
            echo '```json'
            python /tmp/diag_summarize.py outputs/contract_preflight/contract_preflight_result_artifact.json result_artifact 2>&1 | head -200
            echo '```'
            echo
            echo "### preflight_block_diagnosis_record.json"
            echo '```json'
            cat outputs/contract_preflight/preflight_block_diagnosis_record.json 2>/dev/null | head -100 || echo "(not produced)"
            echo '```'
            echo
            echo "### preflight_repair_plan_record.json"
            echo '```json'
            cat outputs/contract_preflight/preflight_repair_plan_record.json 2>/dev/null | head -50 || echo "(not produced)"
            echo '```'
            echo
            echo "### contract_preflight_report.json failure summaries"
            echo '```json'
            python /tmp/diag_summarize.py outputs/contract_preflight/contract_preflight_report.json report_summary 2>&1 | head -300
            echo '```'
            echo
            echo "### producer_failures detail (first 3)"
            echo '```'
            python /tmp/diag_summarize.py outputs/contract_preflight/contract_preflight_report.json producer_failures 2>&1 | head -200
            echo '```'
          } > /tmp/preflight_diag_comment.md 2>&1
          # Always emit to step summary (visible on Actions page, no perms needed)
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat /tmp/preflight_diag_comment.md >> "$GITHUB_STEP_SUMMARY"
          fi
          # Try to comment on PR if event is pull_request (best-effort)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            head -c 60000 /tmp/preflight_diag_comment.md > /tmp/preflight_diag_comment_truncated.md
            gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" \
              -F body=@/tmp/preflight_diag_comment_truncated.md \
              2>&1 | head -20 || echo "(failed to post diagnosis comment; see step summary)"
          fi

  run-pytest:
    needs:
      - enforce-artifact-boundary
      - validate-module-architecture
      - validate-orchestration-boundaries
      - system-registry-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest
        # Non-authoritative redundancy signal only.
        # PR gating execution truth is owned by contract-preflight artifacts.
        run: pytest
