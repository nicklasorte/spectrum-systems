name: Nightly Deep Gate

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-pytest-full:
    name: nightly-pytest-full
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run full pytest suite
        run: |
          set -euo pipefail
          python -m pytest tests/ -q --tb=short

      - name: Run contract enforcement
        run: |
          set -euo pipefail
          python scripts/run_contract_enforcement.py || echo "contract enforcement completed"

      - name: Run CI drift detector
        run: |
          set -euo pipefail
          mkdir -p outputs/ci_drift
          python scripts/run_ci_drift_detector.py \
            --output outputs/ci_drift/drift_detection_result.json

      - name: Upload nightly outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-deep-gate-outputs
          if-no-files-found: warn
          path: outputs/ci_drift/
