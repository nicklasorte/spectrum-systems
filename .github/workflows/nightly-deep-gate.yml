name: nightly-deep-gate

on:
  schedule:
    - cron: '15 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-deep-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python -m pip install -r requirements-dev.txt
      - name: Full pytest
        run: python -m pytest
      - name: Deep replay/certification checks
        run: |
          python scripts/run_replay_execution.py
          python scripts/run_control_loop_chaos_tests.py
          python scripts/run_governance_gate.py --output-dir outputs/governance_gate_nightly
          python scripts/run_certification_gate.py --mode deep --output-dir outputs/certification_gate_nightly
      - name: CI drift detector
        run: python scripts/run_ci_drift_detector.py
