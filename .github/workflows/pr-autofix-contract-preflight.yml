name: pr-autofix-contract-preflight

on:
  workflow_run:
    workflows: ["strategy-compliance"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  explicit-fork-skip:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Emit explicit fork skip
        run: echo "governed contract-preflight autofix skipped: fork PR outside trusted mutation boundary"

  governed-contract-preflight-autofix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout failed head commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Resolve base/head refs
        id: refs
        run: |
          set -euo pipefail
          base_sha="${{ github.event.workflow_run.pull_requests[0].base.sha }}"
          head_sha="${{ github.event.workflow_run.head_sha }}"
          if [[ -z "$base_sha" || -z "$head_sha" ]]; then
            echo "missing base/head sha; fail-closed" >&2
            exit 1
          fi
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Build preflight wrapper and run preflight
        id: preflight
        run: |
          set -euo pipefail
          python scripts/build_preflight_pqx_wrapper.py \
            --base-ref "${{ steps.refs.outputs.base_sha }}" \
            --head-ref "${{ steps.refs.outputs.head_sha }}" \
            --output outputs/contract_preflight/preflight_pqx_task_wrapper.json

          set +e
          python scripts/run_contract_preflight.py \
            --base-ref "${{ steps.refs.outputs.base_sha }}" \
            --head-ref "${{ steps.refs.outputs.head_sha }}" \
            --output-dir outputs/contract_preflight \
            --execution-context pqx_governed \
            --pqx-wrapper-path outputs/contract_preflight/preflight_pqx_task_wrapper.json \
            --authority-evidence-ref artifacts/pqx_runs/preflight.pqx_slice_execution_record.json
          preflight_exit=$?
          set -e
          echo "preflight_exit=$preflight_exit" >> "$GITHUB_OUTPUT"

      - name: Run governed preflight BLOCK autorepair
        if: steps.preflight.outputs.preflight_exit == '2'
        run: |
          set -euo pipefail
          python scripts/run_github_pr_autofix_contract_preflight.py \
            --output-dir outputs/contract_preflight \
            --base-ref "${{ steps.refs.outputs.base_sha }}" \
            --head-ref "${{ steps.refs.outputs.head_sha }}" \
            --execution-context pqx_governed \
            --pqx-wrapper-path outputs/contract_preflight/preflight_pqx_task_wrapper.json \
            --authority-evidence-ref artifacts/pqx_runs/preflight.pqx_slice_execution_record.json \
            --same-repo-write-allowed

      - name: Upload preflight autorepair artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-autofix-contract-preflight-artifacts
          path: outputs/contract_preflight
          if-no-files-found: warn
