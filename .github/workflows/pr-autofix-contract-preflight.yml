name: pr-autofix-contract-preflight

on:
  workflow_run:
    workflows: ["strategy-compliance"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  explicit-fork-skip:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Emit explicit fork skip
        run: echo "governed contract-preflight autofix skipped: fork PR outside trusted mutation boundary"

  governed-contract-preflight-autofix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout failed head commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Resolve base/head refs
        id: refs
        run: |
          set -euo pipefail
          base_sha="${{ github.event.workflow_run.pull_requests[0].base.sha }}"
          head_sha="${{ github.event.workflow_run.head_sha }}"
          if [[ -z "$base_sha" || -z "$head_sha" ]]; then
            echo "missing base/head sha; fail-closed" >&2
            exit 1
          fi
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Build preflight wrapper and run preflight
        id: preflight
        run: |
          set -euo pipefail
          python scripts/build_preflight_pqx_wrapper.py \
            --base-ref "${{ steps.refs.outputs.base_sha }}" \
            --head-ref "${{ steps.refs.outputs.head_sha }}" \
            --output outputs/contract_preflight/preflight_pqx_task_wrapper.json

          set +e
          python scripts/run_contract_preflight.py \
            --base-ref "${{ steps.refs.outputs.base_sha }}" \
            --head-ref "${{ steps.refs.outputs.head_sha }}" \
            --output-dir outputs/contract_preflight \
            --execution-context pqx_governed \
            --pqx-wrapper-path outputs/contract_preflight/preflight_pqx_task_wrapper.json \
            --authority-evidence-ref artifacts/pqx_runs/preflight.pqx_slice_execution_record.json
          preflight_exit=$?
          set -e
          echo "preflight_exit=$preflight_exit" >> "$GITHUB_OUTPUT"

      - name: Run governed preflight BLOCK autorepair
        if: steps.preflight.outputs.preflight_exit == '2'
        id: autorepair
        run: |
          set -euo pipefail
          set +e
          python scripts/run_github_pr_autofix_contract_preflight.py \
            --output-dir outputs/contract_preflight \
            --base-ref "${{ steps.refs.outputs.base_sha }}" \
            --head-ref "${{ steps.refs.outputs.head_sha }}" \
            --execution-context pqx_governed \
            --pqx-wrapper-path outputs/contract_preflight/preflight_pqx_task_wrapper.json \
            --authority-evidence-ref artifacts/pqx_runs/preflight.pqx_slice_execution_record.json \
            --same-repo-write-allowed
          autorepair_exit=$?
          set -e
          echo "autorepair_exit=$autorepair_exit" >> "$GITHUB_OUTPUT"

      - name: Publish preflight BLOCK bundle summary
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          out = Path("outputs/contract_preflight")
          summary = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          lines = ["## Governed contract preflight outcome", ""]
          result = out / "contract_preflight_result_artifact.json"
          if result.exists():
              payload = json.loads(result.read_text(encoding="utf-8"))
              decision = payload.get("control_signal", {}).get("strategy_gate_decision", "UNKNOWN")
              lines.append(f"- strategy_gate_decision: `{decision}`")
          for name in [
              "contract_preflight_report.md",
              "preflight_block_diagnosis_record.json",
              "preflight_repair_plan_record.json",
              "failure_repair_candidate_artifact.json",
              "preflight_repair_result_record.json",
              "preflight_recovery_outcome_record.json",
              "preflight_human_escalation_record.json",
          ]:
              p = out / name
              lines.append(f"- {name}: {'present' if p.exists() else 'missing'}")
          summary.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Enforce final governed preflight decision
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          out = Path("outputs/contract_preflight")
          result = out / "contract_preflight_result_artifact.json"
          if not result.exists():
              raise SystemExit("missing contract_preflight_result_artifact.json")
          payload = json.loads(result.read_text(encoding="utf-8"))
          initial = payload.get("control_signal", {}).get("strategy_gate_decision", "BLOCK")
          pytest_count = int(((payload.get("pytest_execution") or {}).get("pytest_execution_count") or 0))
          record_ref = str(payload.get("pytest_execution_record_ref") or "").strip()
          if not record_ref:
              raise SystemExit("workflow/preflight trust mismatch: missing pytest_execution_record_ref")
          record_path = Path(record_ref)
          if not record_path.exists():
              raise SystemExit(f"workflow/preflight trust mismatch: missing pytest_execution_record artifact at {record_ref}")
          record = json.loads(record_path.read_text(encoding="utf-8"))
          executed = bool(record.get("executed", False))
          selected_targets = record.get("selected_targets") or []
          if initial in {"ALLOW", "WARN"} and pytest_count < 1:
              raise SystemExit("workflow/preflight trust mismatch: allow decision missing preflight-owned pytest execution")
          if initial in {"ALLOW", "WARN"} and not executed:
              raise SystemExit("workflow/preflight trust mismatch: allow decision with executed=false")
          if initial in {"ALLOW", "WARN"} and not selected_targets:
              raise SystemExit("workflow/preflight trust mismatch: allow decision with empty selected_targets")
          selection_ref = str(payload.get("pytest_selection_integrity_result_ref") or "").strip()
          selection = payload.get("pytest_selection_integrity") or {}
          if not selection_ref:
              raise SystemExit("workflow/preflight trust mismatch: missing pytest_selection_integrity_result_ref")
          selection_path = Path(selection_ref)
          if not selection_path.exists():
              raise SystemExit(f"workflow/preflight trust mismatch: missing pytest_selection_integrity_result artifact at {selection_ref}")
          selection_from_ref = json.loads(selection_path.read_text(encoding="utf-8"))
          if initial in {"ALLOW", "WARN"} and str(selection_from_ref.get("selection_integrity_decision") or "BLOCK") != "ALLOW":
              raise SystemExit("workflow/preflight trust mismatch: allow decision with blocked pytest selection integrity")
          if initial in {"ALLOW", "WARN"} and str(selection.get("selection_integrity_decision") or "BLOCK") != "ALLOW":
              raise SystemExit("workflow/preflight trust mismatch: allow decision with in-artifact blocked pytest selection integrity")
          if initial != "BLOCK":
              raise SystemExit(0 if initial in {"ALLOW", "WARN"} else 2)
          outcome_path = out / "preflight_recovery_outcome_record.json"
          if not outcome_path.exists():
              raise SystemExit("BLOCK without preflight_recovery_outcome_record")
          outcome = json.loads(outcome_path.read_text(encoding="utf-8"))
          final_decision = outcome.get("final_decision", "repair_failed")
          if final_decision == "repaired_and_passed":
              raise SystemExit(0)
          raise SystemExit(2)
          PY

      - name: Upload preflight autorepair artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-autofix-contract-preflight-artifacts
          path: outputs/contract_preflight
          if-no-files-found: warn
