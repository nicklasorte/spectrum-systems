name: Cross Repo Governance Compliance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1" # weekly on Mondays at 09:00 UTC
  push:
    branches:
      - main
    paths:
      - "governance/**"
      - "contracts/**"
      - "schemas/**"
      - "ecosystem/**"
      - "scripts/**"
      - ".github/workflows/cross-repo-compliance.yml"

permissions:
  contents: read

jobs:
  governance-manifest-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest

      - name: Validate governance manifests
        run: |
          set -euo pipefail
          for manifest in governance/examples/manifests/*.spectrum-governance.json; do
            python scripts/validate_governance_manifest.py "$manifest";
          done

  cross-repo-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run cross-repo compliance scanner
        run: |
          node governance/compliance-scans/run-cross-repo-compliance.js \
            --config governance/compliance-scans/scan-config.example.json \
            --standards-manifest contracts/standards-manifest.json \
            --output compliance-report.json

      - name: Summarize compliance results
        run: |
          node -e "
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('compliance-report.json', 'utf-8'));
          const byStatus = { pass: [], fail: [], warning: [], not_yet_enforceable: [] };
          for (const repo of report.repos) {
            const s = repo.status || (repo.compliant ? 'pass' : 'fail');
            (byStatus[s] = byStatus[s] || []).push(repo);
          }
          console.log('');
          console.log('=== Governance Compliance Summary ===');
          console.log('Repos in config  : ' + report.repos.length);
          console.log('  PASS               : ' + (byStatus.pass || []).length);
          console.log('  FAIL               : ' + (byStatus.fail || []).length);
          console.log('  WARNING            : ' + (byStatus.warning || []).length);
          console.log('  NOT YET ENFORCEABLE: ' + (byStatus.not_yet_enforceable || []).length);
          if ((byStatus.fail || []).length) {
            console.log('');
            console.log('Failed repos:');
            for (const repo of byStatus.fail) {
              console.log('  [FAIL] ' + repo.repo_name);
              for (const req of repo.missing_requirements || []) {
                console.log('    - MISSING: ' + req);
              }
              for (const f of repo.failures || []) {
                console.log('    - ' + (f.type || 'error').toUpperCase() + ': ' + (f.detail || JSON.stringify(f)));
              }
            }
          }
          if ((byStatus.not_yet_enforceable || []).length) {
            console.log('');
            console.log('Not yet enforceable (repos not cloned in this environment):');
            for (const repo of byStatus.not_yet_enforceable) {
              console.log('  [DEFERRED] ' + repo.repo_name);
            }
          }
          "

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: governance-compliance-report
          path: compliance-report.json

      - name: Fail on compliance violations
        run: |
          node -e "
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('compliance-report.json', 'utf-8'));
          const failed = report.repos.filter(r => r.status === 'fail');
          if (failed.length) {
            console.error('');
            console.error('=== COMPLIANCE GATE FAILED ===');
            for (const repo of failed) {
              console.error('[FAIL] ' + repo.repo_name);
              for (const f of repo.failures || []) {
                console.error('  ' + (f.type || 'error').toUpperCase() + ': ' + (f.detail || JSON.stringify(f)));
              }
            }
            process.exit(1);
          }
          console.log('Compliance gate passed — no failing repos detected.');
          "

  policy-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run governance policy engine
        run: python governance/policies/run-policy-engine.py

      - name: Print policy engine findings
        run: |
          python - <<'PYCODE'
          import json
          from pathlib import Path

          report_path = Path("artifacts") / "policy-engine-report.json"
          report = json.loads(report_path.read_text(encoding="utf-8"))
          results = report.get("results", [])
          summary = report.get("summary", {})

          print("")
          print("=== Policy Engine Results ===")
          print(f"Policies evaluated : {summary.get('policies_evaluated', len(results))}")
          print(f"Repos checked      : {summary.get('repos_checked', 0)}")
          print(f"Errors             : {summary.get('errors', 0)}")
          print(f"Warnings           : {summary.get('warnings', 0)}")
          print("")

          for result in results:
              tag = "PASS" if result["status"] == "pass" else ("WARN" if result["status"] == "warning" else "FAIL")
              print(f"  [{tag}] {result['policy_id']} | {result['subject']}")
              if result["status"] != "pass":
                  print(f"       Reason: {result['message']}")
                  if result.get("evidence"):
                      print(f"       Evidence: {', '.join(str(e) for e in result['evidence'])}")
          PYCODE

      - name: Upload policy engine artifacts
        uses: actions/upload-artifact@v4
        with:
          name: policy-engine-report
          path: |
            artifacts/policy-engine-report.json
            artifacts/policy-engine-summary.md

      - name: Fail on error-severity policy failures
        run: |
          python - <<'PYCODE'
          import json
          from pathlib import Path

          report_path = Path("artifacts") / "policy-engine-report.json"
          report = json.loads(report_path.read_text(encoding="utf-8"))
          failures = [
              r for r in report.get("results", [])
              if r.get("severity") == "error" and r.get("status") == "fail"
          ]
          if failures:
              print("")
              print("=== POLICY ENGINE GATE FAILED ===")
              for item in failures:
                  print(f"[FAIL] {item['policy_id']} | {item['subject']}")
                  print(f"       Reason  : {item['message']}")
                  if item.get('evidence'):
                      print(f"       Evidence: {', '.join(str(e) for e in item['evidence'])}")
              raise SystemExit(
                  f"\n{len(failures)} error-severity policy failure(s) detected. "
                  "See details above."
              )
          PYCODE

  dependency-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Generate ecosystem dependency graph
        run: python scripts/generate_dependency_graph.py

      - name: Upload dependency graph artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-dependency-graph
          path: |
            artifacts/ecosystem-dependency-graph.json
            artifacts/ecosystem-dependency-graph.mmd

  contract-enforcement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run cross-repo contract enforcement
        run: python scripts/run_contract_enforcement.py

      - name: Print enforcement summary
        if: always()
        run: |
          python - <<'PYCODE'
          import json
          from pathlib import Path

          graph_path = Path("governance/reports/contract-dependency-graph.json")
          if not graph_path.exists():
              print("Contract dependency graph not found — enforcement may have failed before writing outputs.")
              raise SystemExit(0)

          graph = json.loads(graph_path.read_text(encoding="utf-8"))
          repos = graph.get("repos", [])
          by_status = {}
          for r in repos:
              s = r["validation_status"]
              by_status.setdefault(s, []).append(r["repo_name"])

          print("")
          print("=== Contract Enforcement Results ===")
          print(f"Repos inspected         : {len(repos)}")
          print(f"  PASS                  : {len(by_status.get('pass', []))}")
          print(f"  FAIL                  : {len(by_status.get('fail', []))}")
          print(f"  WARNING               : {len(by_status.get('warning', []))}")
          print(f"  NOT YET ENFORCEABLE   : {len(by_status.get('not_yet_enforceable', []))}")
          print(f"  GOVERNANCE REPO       : {len(by_status.get('governance-repo', []))}")
          print("")

          for repo in repos:
              if repo["validation_status"] in ("fail", "warning"):
                  tag = "FAIL" if repo["validation_status"] == "fail" else "WARN"
                  print(f"  [{tag}] {repo['repo_name']}")
                  for f in repo.get("failures", []):
                      print(f"       [contract-enforcement] repo={f['repo']} system_id={f['system_id']} contract={f['contract']} rule={f['rule']} error={f['error']}")
                  for w in repo.get("warnings", []):
                      print(f"       [contract-enforcement] repo={w['repo']} system_id={w['system_id']} contract={w['contract']} rule={w['rule']} error={w.get('message', '')}")

          if by_status.get("not_yet_enforceable"):
              print("")
              print("  Not yet enforceable (no governance manifest):")
              for r in by_status["not_yet_enforceable"]:
                  print(f"    [DEFERRED] {r}")
          PYCODE

      - name: Upload contract enforcement artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-enforcement-report
          path: |
            governance/reports/contract-dependency-graph.json
            docs/governance-reports/contract-enforcement-report.md

      - name: Fail on real contract enforcement violations
        run: |
          python - <<'PYCODE'
          import json
          from pathlib import Path

          graph_path = Path("governance/reports/contract-dependency-graph.json")
          graph = json.loads(graph_path.read_text(encoding="utf-8"))
          failed = [r for r in graph.get("repos", []) if r["validation_status"] == "fail"]
          if failed:
              print("")
              print("=== CONTRACT ENFORCEMENT GATE FAILED ===")
              for repo in failed:
                  sid = repo.get("system_id", "")
                  for f in repo.get("failures", []):
                      print(
                          f"[contract-enforcement] repo={f['repo']} system_id={sid} "
                          f"contract={f['contract']} rule={f['rule']} error={f['error']}"
                      )
              raise SystemExit(
                  f"\n{len(failed)} repo(s) have contract enforcement failures. "
                  "See details above."
              )
          print("Contract enforcement gate passed — no failing repos detected.")
          PYCODE

  observability-reports:
    runs-on: ubuntu-latest
    needs:
      - contract-enforcement
      - policy-engine
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Regenerate contract enforcement graph (prerequisite)
        run: python scripts/run_contract_enforcement.py

      - name: Run governance policy engine (prerequisite)
        run: python governance/policies/run-policy-engine.py

      - name: Generate ecosystem health report
        run: python scripts/generate_ecosystem_health_report.py

      - name: Generate ecosystem architecture graph
        run: python scripts/generate_ecosystem_architecture_graph.py

      - name: Print observability summary
        run: |
          python - <<'PYCODE'
          import json
          from pathlib import Path

          health_path = Path("governance/reports/ecosystem-health.json")
          if not health_path.exists():
              print("ecosystem-health.json not found — observability generation may have failed.")
              raise SystemExit(1)

          report = json.loads(health_path.read_text(encoding="utf-8"))
          summary = report.get("summary", {})

          print("")
          print("=== Ecosystem Observability Summary ===")
          print(f"Overall Health       : {summary.get('overall_health', 'unknown').upper()}")
          print(f"Total Repos          : {summary.get('total_repos', 0)}")
          print("")

          gc = summary.get("governance_compliance", {})
          print("Governance Compliance:")
          for status, count in sorted(gc.items()):
              print(f"  {status:<22}: {count}")

          ca = summary.get("contract_alignment", {})
          print("Contract Alignment:")
          for status, count in sorted(ca.items()):
              print(f"  {status:<22}: {count}")

          print("")
          missing = summary.get("repos_missing_required_artifacts", [])
          if missing:
              print("Repos missing required governance artifacts:")
              for r in missing:
                  print(f"  - {r}")
          else:
              print("All repos have required governance artifacts.")

          nye = summary.get("repos_not_yet_enforceable", [])
          if nye:
              print("Repos not yet enforceable (deferred — will not fail CI):")
              for r in nye:
                  print(f"  [DEFERRED] {r}")
          PYCODE

      - name: Upload ecosystem observability reports
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-observability-reports
          path: |
            governance/reports/ecosystem-health.json
            governance/reports/ecosystem-architecture-graph.json
            governance/reports/ecosystem-architecture-graph.mmd
            docs/governance-reports/ecosystem-health-report.md
            docs/governance-reports/ecosystem-dashboard.md

      - name: Fail only on true governance health failures
        run: |
          python - <<'PYCODE'
          import json
          from pathlib import Path

          health_path = Path("governance/reports/ecosystem-health.json")
          report = json.loads(health_path.read_text(encoding="utf-8"))
          overall = report.get("summary", {}).get("overall_health", "healthy")

          # Only "failing" blocks CI. "warning" and "healthy" pass.
          if overall == "failing":
              print("")
              print("=== OBSERVABILITY GATE FAILED ===")
              for rec in report.get("repos", []):
                  gs = rec.get("governance_status", "")
                  cs = rec.get("contract_status", "")
                  if gs == "fail" or cs == "fail":
                      print(
                          f"[ecosystem-health] repo={rec['repo_name']} "
                          f"governance={gs} contract={cs}"
                      )
              raise SystemExit(
                  f"\nEcosystem health is FAILING — see details above. "
                  "Warnings and not-yet-enforceable states do NOT block CI."
              )
          print(f"Observability gate passed — overall health: {overall.upper()}.")
          PYCODE

