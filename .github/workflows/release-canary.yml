name: release-canary

on:
  push:
    paths:
      - 'scripts/run_release_canary.py'
      - 'scripts/run_eval_coverage_report.py'
      - 'spectrum_systems/modules/evaluation/eval_coverage_reporting.py'
      - 'spectrum_systems/modules/runtime/release_canary.py'
      - 'spectrum_systems/modules/evaluation/eval_engine.py'
      - 'data/policy/eval_release_policy.json'
      - 'data/policy/eval_coverage_policy.json'
      - 'contracts/examples/eval_run.json'
      - 'contracts/examples/eval_case.json'
      - '.github/workflows/release-canary.yml'
      - 'requirements.txt'
      - 'requirements-dev.txt'
  pull_request:
    paths:
      - 'scripts/run_release_canary.py'
      - 'scripts/run_eval_coverage_report.py'
      - 'spectrum_systems/modules/evaluation/eval_coverage_reporting.py'
      - 'spectrum_systems/modules/runtime/release_canary.py'
      - 'spectrum_systems/modules/evaluation/eval_engine.py'
      - 'data/policy/eval_release_policy.json'
      - 'data/policy/eval_coverage_policy.json'
      - 'contracts/examples/eval_run.json'
      - 'contracts/examples/eval_case.json'
      - '.github/workflows/release-canary.yml'
      - 'requirements.txt'
      - 'requirements-dev.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-release-canary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify dependency bootstrap contract
        run: python scripts/verify_environment.py --python-only

      - name: Run release canary smoke path
        run: |
          cat > /tmp/eval_run_release_canary_smoke.json <<'JSON'
          {
            "artifact_type": "eval_run",
            "schema_version": "1.0.0",
            "trace_id": "22222222-2222-4222-8222-222222222222",
            "eval_run_id": "eval-run-release-canary-smoke",
            "eval_case_ids": ["eval-case-001"],
            "system_version": "spectrum-systems@smoke",
            "dataset_version": "golden-dataset@smoke",
            "timestamp": "2026-03-24T00:00:00Z"
          }
          JSON

          python scripts/run_release_canary.py \
            --baseline-eval-run /tmp/eval_run_release_canary_smoke.json \
            --baseline-eval-cases contracts/examples/eval_case.json \
            --candidate-eval-run /tmp/eval_run_release_canary_smoke.json \
            --candidate-eval-cases contracts/examples/eval_case.json \
            --baseline-version baseline-smoke \
            --candidate-version candidate-smoke \
            --baseline-prompt-version-id prompt-baseline \
            --candidate-prompt-version-id prompt-candidate \
            --baseline-schema-version schema-baseline \
            --candidate-schema-version schema-candidate \
            --baseline-policy-version-id policy-baseline \
            --candidate-policy-version-id policy-candidate

      - name: Upload release canary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-canary-smoke-artifacts
          path: outputs/release_canary/
          if-no-files-found: warn
