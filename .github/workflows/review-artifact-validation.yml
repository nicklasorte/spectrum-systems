name: review-artifact-validation

on:
  push:
    paths:
      - 'design-reviews/**'
      - 'docs/reviews/review-registry.json'
      - 'docs/reviews/review-registry.schema.json'
      - 'docs/review-registry.md'
      - 'scripts/check_review_registry.py'
      - 'tests/test_review_registry_json.py'
      - 'scripts/validate-review-artifacts.js'
      - '.github/workflows/review-artifact-validation.yml'
  pull_request:
    paths:
      - 'design-reviews/**'
      - 'docs/reviews/review-registry.json'
      - 'docs/reviews/review-registry.schema.json'
      - 'docs/review-registry.md'
      - 'scripts/check_review_registry.py'
      - 'tests/test_review_registry_json.py'
      - 'scripts/validate-review-artifacts.js'
      - '.github/workflows/review-artifact-validation.yml'

permissions:
  contents: read

jobs:
  validate-review-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install validation dependencies
        run: npm install --no-save --no-package-lock ajv@^8 ajv-formats@^2

      - name: Validate review artifacts
        run: node scripts/validate-review-artifacts.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate review registry
        run: python scripts/check_review_registry.py --fail-on-overdue

      - name: Run pytest
        run: pytest
