name: review-artifact-validation

on:
  push:
    paths:
      - 'design-reviews/**'
      - 'docs/reviews/review-registry.json'
      - 'docs/reviews/review-registry.schema.json'
      - 'docs/review-registry.md'
      - 'scripts/check_review_registry.py'
      - 'tests/test_review_registry_json.py'
      - 'scripts/validate-review-artifacts.js'
      - 'scripts/run_review_artifact_validation.py'
      - '.github/workflows/review-artifact-validation.yml'
  pull_request:
    paths:
      - 'design-reviews/**'
      - 'docs/reviews/review-registry.json'
      - 'docs/reviews/review-registry.schema.json'
      - 'docs/review-registry.md'
      - 'scripts/check_review_registry.py'
      - 'tests/test_review_registry_json.py'
      - 'scripts/validate-review-artifacts.js'
      - 'scripts/run_review_artifact_validation.py'
      - '.github/workflows/review-artifact-validation.yml'

permissions:
  contents: read

jobs:
  validate-review-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run canonical review artifact validation
        run: python scripts/run_review_artifact_validation.py --repo-root . --allow-full-pytest
