name: review-trigger-pipeline

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string
      review_source:
        description: "Review source module/system scope"
        required: true
        type: string
      run_mode:
        description: "Pipeline mode (strict|standard)"
        required: true
        type: choice
        options: [strict, standard]

permissions:
  contents: read
  pull-requests: write

jobs:
  ingest-and-run-ril:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Guard trigger and run governed ingestion pipeline
        id: review_trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
          OUTPUT_ROOT: artifacts/github_review_ingestion
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          EMITTED_AT: ${{ github.event.pull_request.updated_at || github.event.comment.updated_at || github.event.comment.created_at || github.event.review.submitted_at || github.event.issue.updated_at || github.event.repository.updated_at }}
          DISPATCH_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          DISPATCH_REVIEW_SOURCE: ${{ github.event.inputs.review_source }}
          DISPATCH_RUN_MODE: ${{ github.event.inputs.run_mode }}
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT_ROOT"

          if [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            REVIEW_SOURCE="ril"
            RUN_MODE="strict"
            PR_NUMBER=""
            python - <<'PY'
import json
import os
from pathlib import Path
event = json.loads(Path(os.environ["EVENT_PATH"]).read_text(encoding="utf-8"))
review = event.get("review")
body = review.get("body") if isinstance(review, dict) else None
if not isinstance(body, str) or not body.strip():
    raise SystemExit("pull_request_review submitted trigger requires non-empty review.body")
PY
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            REVIEW_SOURCE="ril"
            RUN_MODE="strict"
            PR_NUMBER=""
            python - <<'PY'
import json
import os
from pathlib import Path
event = json.loads(Path(os.environ["EVENT_PATH"]).read_text(encoding="utf-8"))
issue = event.get("issue")
if not isinstance(issue, dict) or "pull_request" not in issue:
    raise SystemExit("issue_comment trigger allowed only for pull request threads")
comment = event.get("comment")
body = comment.get("body") if isinstance(comment, dict) else None
markers = ("/governed-next-step", "/run-ril", "/roadmap-2step")
if not isinstance(body, str) or not any(marker in body for marker in markers):
    raise SystemExit("issue_comment trigger requires approved command marker")
PY
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            REVIEW_SOURCE="${DISPATCH_REVIEW_SOURCE}"
            RUN_MODE="${DISPATCH_RUN_MODE}"
            PR_NUMBER="${DISPATCH_PR_NUMBER}"
            if [[ -z "$REVIEW_SOURCE" || -z "$RUN_MODE" || -z "$PR_NUMBER" ]]; then
              echo "workflow_dispatch requires pr_number, review_source, run_mode" >&2
              exit 1
            fi
            if [[ ! "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
              echo "workflow_dispatch pr_number must be a positive integer" >&2
              exit 1
            fi
            if [[ "$RUN_MODE" != "strict" && "$RUN_MODE" != "standard" ]]; then
              echo "workflow_dispatch run_mode must be strict|standard" >&2
              exit 1
            fi
            if [[ "$REVIEW_SOURCE" != "ril" ]]; then
              echo "workflow_dispatch review_source must be ril for governed routing" >&2
              exit 1
            fi
          else
            echo "Unsupported event: $EVENT_NAME" >&2
            exit 1
          fi

          CMD=(python -m spectrum_systems.modules.runtime.github_review_ingestion
            --event-name "$EVENT_NAME"
            --event-path "$EVENT_PATH"
            --output-root "$OUTPUT_ROOT"
            --review-source "$REVIEW_SOURCE"
            --run-mode "$RUN_MODE"
            --repo "$REPO"
            --sha "$SHA"
            --run-id "$RUN_ID"
          )

          if [[ -n "$PR_NUMBER" ]]; then
            CMD+=(--pr-number "$PR_NUMBER")
          fi

          if [[ -n "${EMITTED_AT:-}" ]]; then
            CMD+=(--emitted-at "$EMITTED_AT")
          fi

          "${CMD[@]}" > ingestion_result.json

          ARTIFACT_DIR=$(python - <<'PY'
import json
from pathlib import Path
payload = json.loads(Path('ingestion_result.json').read_text(encoding='utf-8'))
print(payload['artifact_dir'])
PY
)
          HANDOFF_PATH=$(python - <<'PY'
import json
from pathlib import Path
payload = json.loads(Path('ingestion_result.json').read_text(encoding='utf-8'))
handoff = payload.get('artifact_paths', {}).get('github_review_handoff_artifact')
if not isinstance(handoff, str) or not handoff.strip():
    raise SystemExit("missing github_review_handoff_artifact in ingestion_result")
print(handoff)
PY
)
          cp "$HANDOFF_PATH" github_review_handoff_artifact.json

          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload governed review ingestion artifacts
        uses: actions/upload-artifact@v4
        with:
          name: review-trigger-pipeline-artifacts
          path: |
            ingestion_result.json
            github_review_handoff_artifact.json
            ${{ steps.review_trigger.outputs.artifact_dir }}
          if-no-files-found: error

      - name: Write workflow summary
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
import json
from pathlib import Path

result_path = Path('ingestion_result.json')
if not result_path.exists():
    raise SystemExit('ingestion_result.json missing; guardrails failed closed before output emission')

payload = json.loads(result_path.read_text(encoding='utf-8'))

lines = [
    '## Review Trigger Pipeline Summary',
    '',
    f"- Status: **{payload['status']}**",
    f"- PR: **#{payload['pr_number']}**",
    f"- Event: **{payload['event_name']}**",
    f"- Review source: **{payload['review_source']}**",
    f"- Artifact directory: `{payload['artifact_dir']}`",
    '- Artifacts produced:',
]
for key in payload['artifacts_produced']:
    lines.append(f"  - `{key}`")
handoff_path = payload.get("artifact_paths", {}).get("github_review_handoff_artifact")
lines.append(f"- Deterministic handoff: `{handoff_path}`")

Path('summary.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
PY
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
